name: Termux Run

on:
  workflow_run:
    workflows:
      - Pull Request Validation
    types:
      - completed
  workflow_dispatch:
    inputs:
      termux_channel:
        description: Termux APK release channel
        required: true
        type: choice
        default: stable
        options:
          - stable
          - latest
      restore_snapshot:
        description: Restore the latest cached emulator snapshot before running
        required: true
        type: boolean
        default: false
      save_snapshot:
        description: Save the emulator snapshot after a successful run
        required: true
        type: boolean
        default: false
      extra_commands:
        description: Additional Termux commands to run inside the emulator
        required: false
        type: string
        default: ""
      extra_commands_at_start:
        description: Run additional commands before default package setup
        required: true
        type: boolean
        default: false
      release_tag:
        description: Release tag to download and smoke-test inside Termux
        required: false
        type: string
        default: ""

permissions:
  actions: read
  contents: read

concurrency:
  group: termux-emulator-probe-${{ github.event.workflow_run.id || github.ref }}
  cancel-in-progress: true

jobs:
  api35-x86_64:
    name: API 35 x86_64 Termux probe
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    defaults:
      run:
        shell: bash

    env:
      TERMUX_HOME: /data/data/com.termux/files/home
      TERMUX_PREFIX: /data/data/com.termux/files/usr
      TERMUX_INSTALL_ABI: arm64-v8a
      TERMUX_CHANNEL_INPUT: ${{ inputs.termux_channel || 'stable' }}
      TERMUX_RESTORE_SNAPSHOT_INPUT: ${{ github.event_name == 'workflow_run' || inputs.restore_snapshot }}
      TERMUX_SAVE_SNAPSHOT_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.save_snapshot }}
      TERMUX_RELEASE_TEST_TAG: ${{ inputs.release_tag || '' }}
      TERMUX_AVD_CACHE_PREFIX: termux-avd-api35-google_apis-x86_64-pixel_5-termux-arm64-v8a-${{ inputs.termux_channel || 'stable' }}-
      TERMUX_AVD_CACHE_KEY: termux-avd-api35-google_apis-x86_64-pixel_5-termux-arm64-v8a-${{ inputs.termux_channel || 'stable' }}-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download Termux APK
        if: ${{ env.TERMUX_RESTORE_SNAPSHOT_INPUT != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TERMUX_CHANNEL: ${{ env.TERMUX_CHANNEL_INPUT }}
          TERMUX_INSTALL_ABI: ${{ env.TERMUX_INSTALL_ABI }}
        run: |
          ./.github/scripts/download-termux-apk.sh

      - name: Download PR standalone archive
        if: ${{ github.event_name == 'workflow_run' }}
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          ./.github/scripts/download-pr-check-artifact.sh

      - name: Enable KVM
        run: |
          set -eu

          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Restore AVD snapshot cache
        id: restore-avd-cache
        if: ${{ env.TERMUX_RESTORE_SNAPSHOT_INPUT == 'true' }}
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.android/avd
          key: ${{ env.TERMUX_AVD_CACHE_KEY }}
          restore-keys: |
            ${{ env.TERMUX_AVD_CACHE_PREFIX }}

      - name: Configure emulator options
        id: emulator-options
        env:
          RESTORE_SNAPSHOT: ${{ env.TERMUX_RESTORE_SNAPSHOT_INPUT }}
          SAVE_SNAPSHOT: ${{ env.TERMUX_SAVE_SNAPSHOT_INPUT }}
        run: |
          set -eu

          emulator_options=()
          if [[ "$RESTORE_SNAPSHOT" != "true" ]]; then
            emulator_options+=("-no-snapshot-load")
          fi
          if [[ "$SAVE_SNAPSHOT" != "true" ]]; then
            emulator_options+=("-no-snapshot-save")
          fi
          emulator_options+=(
            "-no-window"
            "-gpu" "swiftshader_indirect"
            "-noaudio"
            "-no-boot-anim"
            "-camera-back" "none"
            "-camera-front" "none"
            "-netfast"
            "-no-accel-check"
            "-skip-adb-auth"
          )

          printf 'options=%s\n' "${emulator_options[*]}" >> "$GITHUB_OUTPUT"
          printf 'Emulator options: %s\n' "${emulator_options[*]}"

      - name: Probe Termux in Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          TERMUX_BOOTSTRAP_ATTEMPTS: 240
          TERMUX_INSTALL_ABI: ${{ env.TERMUX_INSTALL_ABI }}
          TERMUX_RESTORE_SNAPSHOT: ${{ env.TERMUX_RESTORE_SNAPSHOT_INPUT }}
          TERMUX_RESTORED_AVD_CACHE: ${{ steps.restore-avd-cache.outputs.cache-matched-key != '' }}
          TERMUX_RESTORED_AVD_CACHE_KEY: ${{ steps.restore-avd-cache.outputs.cache-matched-key || '' }}
          TERMUX_SAVE_SNAPSHOT: ${{ env.TERMUX_SAVE_SNAPSHOT_INPUT }}
          TERMUX_EXTRA_COMMANDS: ${{ inputs.extra_commands || '' }}
          TERMUX_EXTRA_COMMANDS_AT_START: ${{ inputs.extra_commands_at_start || false }}
          TERMUX_RELEASE_TEST_TAG: ${{ env.TERMUX_RELEASE_TEST_TAG }}
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_5
          force-avd-creation: false
          emulator-options: ${{ steps.emulator-options.outputs.options }}
          disable-animations: true
          script: bash .github/scripts/termux-emulator-probe.sh

      - name: Save AVD snapshot cache
        if: ${{ env.TERMUX_SAVE_SNAPSHOT_INPUT == 'true' && success() }}
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.android/avd
          key: ${{ env.TERMUX_AVD_CACHE_KEY }}

      - name: Upload emulator diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: termux-emulator-diagnostics
          path: |
            termux-emulator-logcat.txt
            termux-emulator-probe.env
            termux-releases.json
            termux-pr-artifact/antigravity-termux-standalone.tar.gz
          if-no-files-found: ignore
