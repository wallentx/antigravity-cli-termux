name: Termux Run

on:
  workflow_run:
    workflows:
      - Pull Request Validation
    types:
      - completed
  workflow_dispatch:
    inputs:
      release_version:
        description: Release version or tag to smoke-test, for example 1.0.7 or v1.0.7
        required: true
        type: string

permissions:
  actions: read
  contents: read

jobs:
  run-termux:
    name: Run Termux Docker (ARM)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Prepare standalone archive
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id || '' }}
          RELEASE_VERSION: ${{ inputs.release_version || '' }}
        run: |
          set -euo pipefail

          mkdir -p artifact

          if [ "$EVENT_NAME" = "workflow_run" ]; then
            echo "Downloading PR build artifact from workflow run ${SOURCE_RUN_ID}..."
            gh run download "$SOURCE_RUN_ID" \
              --repo "$GITHUB_REPOSITORY" \
              --name antigravity-termux-standalone-preview \
              --dir artifact
          else
            release_tag="$RELEASE_VERSION"
            case "$release_tag" in
              v*) ;;
              *) release_tag="v${release_tag}" ;;
            esac

            echo "Downloading release artifact for ${release_tag}..."
            curl -fsSL \
              -o artifact/antigravity-termux-standalone.tar.gz \
              "https://github.com/${GITHUB_REPOSITORY}/releases/download/${release_tag}/antigravity-termux-standalone.tar.gz"
          fi

          test -f artifact/antigravity-termux-standalone.tar.gz
          tar -tzf artifact/antigravity-termux-standalone.tar.gz

      - name: Run termux-docker-pacman
        run: |
          docker run --rm -i \
            -v "$PWD/artifact:/artifact:ro" \
            termux/termux-docker-pacman sh <<'TERMUX_SCRIPT'
          set -eu
          export CI=true

          pacman -Syyu --noconfirm
          pacman -S --noconfirm ca-certificates glibc glibc-runner

          rm -rf agy-smoke
          mkdir -p agy-smoke
          tar -xzf /artifact/antigravity-termux-standalone.tar.gz -C agy-smoke
          find agy-smoke -maxdepth 2 -type f -print

          if [ -x agy-smoke/agy ]; then
            agy=agy-smoke/agy
          elif [ -x agy-smoke/bin/agy ]; then
            agy=agy-smoke/bin/agy
          else
            echo "Could not find executable agy in release archive." >&2
            exit 1
          fi

          "$agy" --help
          TERMUX_SCRIPT
