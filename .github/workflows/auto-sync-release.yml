name: Automated Antigravity Termux Sync

on:
  schedule:
    # Check for updates every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry Run (skip attestation and release creation)'
        required: false
        type: boolean
        default: 'false'

jobs:
  check-and-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    permissions:
      id-token: write
      attestations: write
      contents: write
      actions: read
      checks: read
      deployments: read
      issues: read
      discussions: read
      packages: read
      pages: read
      pull-requests: read
      repository-projects: read
      statuses: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🧰 Actions Toolbox
        uses: wallentx/gh-actions/composite/actions-toolbox@main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          checkout: false

      - name: Check for New Version
        id: check_version
        env:
          GH_TOKEN: ${{ github.token }}
          MANIFEST_URL: https://antigravity-cli-auto-updater-974169037036.us-central1.run.app/manifests/linux_arm64.json
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          ./.github/scripts/check-version.sh

      - name: Build Standalone Binaries
        if: steps.check_version.outputs.build_needed == 'true'
        run: |
          ./build.sh

      - name: Package Standalone Archive
        if: steps.check_version.outputs.build_needed == 'true'
        run: |
          echo "Packaging standalone release archive (bin/ footprint only)..."
          tar -czf antigravity-termux-standalone.tar.gz bin/

      - name: Upload Standalone Archive to Run Artifacts
        if: steps.check_version.outputs.build_needed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: antigravity-termux-standalone-${{ steps.check_version.outputs.version }}
          path: antigravity-termux-standalone.tar.gz
          if-no-files-found: error

      - name: Attest Artifacts
        uses: actions/attest-build-provenance@v4
        if: steps.check_version.outputs.build_needed == 'true' && github.event.inputs.dry_run != 'true'
        with:
          subject-path: 'antigravity-termux-standalone.tar.gz'

      - name: Set up mq
        if: steps.check_version.outputs.build_needed == 'true'
        uses: harehare/setup-mq@v1

      - name: Fetch and Parse Release Notes
        if: steps.check_version.outputs.build_needed == 'true'
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          ./.github/scripts/generate-release-notes.sh \
            "${{ steps.check_version.outputs.version }}"

      - name: Create and Publish GitHub Release
        if: steps.check_version.outputs.build_needed == 'true' && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.check_version.outputs.version }}"
          gh release create "v$VERSION" \
            --repo "${{ github.repository }}" \
            --title "Antigravity CLI Termux Standalone v$VERSION" \
            --notes-file staging/release-notes.md \
            antigravity-termux-standalone.tar.gz

      - name: Post Run Summary
        if: steps.check_version.outputs.build_needed == 'true'
        run: |
          {
            echo "### 🚀 Antigravity CLI Standalone Release Build Summary"
            echo ""
            echo "#### 📦 Built Standalone Archive Details"
            echo "| Property | Value |"
            echo "| --- | --- |"
            echo "| **Archive Name** | \`antigravity-termux-standalone.tar.gz\` |"

            FILE_SIZE=$(du -h antigravity-termux-standalone.tar.gz | cut -f1)
            echo "| **File Size** | $FILE_SIZE |"

            SHA_HASH=$(sha256sum antigravity-termux-standalone.tar.gz | cut -d' ' -f1)
            echo "| **SHA-256 Checksum** | \`$SHA_HASH\` |"
            echo ""

            echo "#### 📥 Download Links"
            echo "* 🔗 [Download from GHA Run Artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) (Located at the bottom of the run page)"
            if [[ "${{ github.event.inputs.dry_run }}" != "true" ]]; then
              echo "* 📦 [Download from GitHub Releases](${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ steps.check_version.outputs.version }})"
            fi
            echo ""

            echo "#### 📝 Generated Release Notes"
            echo "---"
            cat staging/release-notes.md
          } >> "$GITHUB_STEP_SUMMARY"
