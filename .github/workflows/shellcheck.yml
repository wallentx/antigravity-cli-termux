name: ShellCheck

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: shellcheck-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Classify Changed Paths
        id: path_policy
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: ./.github/scripts/changed-paths.sh

      - name: Skip ShellCheck
        if: ${{ steps.path_policy.outputs.shellcheck != 'true' }}
        run: echo "No maintained shell scripts changed; skipping ShellCheck."

      - name: 🧰 Actions Toolbox
        if: ${{ steps.path_policy.outputs.shellcheck == 'true' }}
        uses: wallentx/gh-actions/composite/actions-toolbox@main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          checkout: false
          include-packages: |
            shellcheck

      - name: Run ShellCheck
        if: ${{ steps.path_policy.outputs.shellcheck == 'true' }}
        env:
          SHELLCHECK_FILES: ${{ steps.path_policy.outputs.shellcheck_files }}
        run: |
          mapfile -t shellcheck_files < <(printf '%s' "$SHELLCHECK_FILES")
          shellcheck --color=always -- "${shellcheck_files[@]}"
