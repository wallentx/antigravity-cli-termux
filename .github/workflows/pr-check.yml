name: Pull Request Validation

on:
  pull_request:
    branches:
      - dev

permissions:
  contents: read
  pull-requests: write

jobs:
  c-style-and-tidy:
    name: C/C++ Format and Tidy
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run clang-format and clang-tidy
        id: cpp_linter
        uses: cpp-linter/cpp-linter-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          style: file
          tidy-checks: ''
          files-changed-only: false
          lines-changed-only: false
          thread-comments: update
          step-summary: true
          file-annotations: true
          extra-args: '-std=gnu11'

      - name: Fail on clang-format or clang-tidy findings
        if: steps.cpp_linter.outputs.checks-failed > 0
        run: exit 1

  cppcheck:
    name: C/C++ Static Analysis
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🧰 Actions Toolbox
        uses: wallentx/gh-actions/composite/actions-toolbox@main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          checkout: false
          include-packages: |
            cppcheck

      - name: Run C Static Analysis
        run: |
          echo "Running cppcheck static analysis on C source files..."
          cppcheck --enable=warning,performance,portability --suppress=missingIncludeSystem --error-exitcode=1 lib/

  strict-compile:
    name: Strict GCC and Clang Compile
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Strict C Compiler Diagnostic Check
        run: |
          echo "Verifying standalone C compilation under strict warning flags with GCC and Clang..."
          mkdir -p bin

          strict_flags=(
            -std=gnu11
            -Wall
            -Wextra
            -Wpedantic
            -Wshadow
            -Wformat=2
            -Wundef
            -Wcast-align
            -Wconversion
            -Wsign-conversion
            -Werror
            -O2
          )

          for cc in gcc clang; do
            echo "Compiling core bootstrapper with ${cc}..."
            "$cc" "${strict_flags[@]}" -o "bin/agy-${cc}" lib/agy_helper.c

            for source in lib/*.c; do
              [[ -e "$source" ]] || continue
              [[ "$source" == "lib/agy_helper.c" ]] && continue

              base_name=$(basename "$source" .c)
              echo "Auxiliary C library detected: $source. Verifying shared-object compilation with ${cc}..."
              "$cc" "${strict_flags[@]}" -fPIC -shared -o "lib/lib${base_name}-${cc}.so" "$source" -ldl
            done
          done

  build-and-package:
    name: Build, Package, and Archive Check
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: End-to-End Build Integration Test
        run: |
          echo "Running build.sh builder integration test..."
          ./build.sh

      - name: Package Standalone Archive
        run: |
          echo "Packaging standalone release archive (bin/ footprint only)..."
          tar -czf antigravity-termux-standalone.tar.gz bin/

      - name: Assert Archive Integrity & Layout
        run: |
          if [[ ! -f antigravity-termux-standalone.tar.gz ]]; then
            echo "Error: Release archive antigravity-termux-standalone.tar.gz was not generated." >&2
            exit 1
          fi

          echo "Verifying archive contents..."
          tar -tf antigravity-termux-standalone.tar.gz

          tar -tzf antigravity-termux-standalone.tar.gz | grep -qE '^bin/agy$' || (echo "Error: Missing bin/agy in release archive!" && exit 1)
          tar -tzf antigravity-termux-standalone.tar.gz | grep -qE '^bin/agy\.va39$' || (echo "Error: Missing bin/agy.va39 in release archive!" && exit 1)

          echo "Archive validation passed successfully! Footprint is clean."

      - name: Upload Standalone Tarball Preview
        uses: actions/upload-artifact@v7
        with:
          name: antigravity-termux-standalone-preview
          path: antigravity-termux-standalone.tar.gz
          if-no-files-found: error
