name: Termux Run Dockerify

on:
  push:
    branches:
      - wallentx/emulator
  workflow_dispatch:
    inputs:
      termux_channel:
        description: Termux APK release channel
        required: true
        type: choice
        default: stable
        options:
          - stable
          - latest
      extra_commands:
        description: Additional Termux commands to run inside the emulator
        required: false
        type: string
        default: ""
      extra_commands_at_start:
        description: Run additional commands before default package setup
        required: true
        type: boolean
        default: false
      release_tag:
        description: Release tag to download and smoke-test inside Termux
        required: false
        type: string
        default: ""
      dockerify_android_image:
        description: Dockerify Android image reference
        required: false
        type: string
        default: shmayro/dockerify-android:latest

permissions:
  actions: read
  contents: read

concurrency:
  group: termux-dockerify-probe-${{ github.event.workflow_run.id || github.ref }}
  cancel-in-progress: true

jobs:
  arm64-dockerify:
    name: ARM64 Dockerify Termux probe
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' || (github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45

    defaults:
      run:
        shell: bash

    env:
      TERMUX_HOME: /data/data/com.termux/files/home
      TERMUX_PREFIX: /data/data/com.termux/files/usr
      TERMUX_INSTALL_ABI: arm64-v8a
      TERMUX_CHANNEL_INPUT: ${{ inputs.termux_channel || 'stable' }}
      TERMUX_RELEASE_TEST_TAG: ${{ inputs.release_tag || '' }}
      DOCKERIFY_ANDROID_IMAGE: ${{ inputs.dockerify_android_image || 'shmayro/dockerify-android:latest' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download Termux APK
        env:
          GH_TOKEN: ${{ github.token }}
          TERMUX_CHANNEL: ${{ env.TERMUX_CHANNEL_INPUT }}
          TERMUX_INSTALL_ABI: ${{ env.TERMUX_INSTALL_ABI }}
        run: |
          ./.github/scripts/download-termux-apk.sh

      - name: Download PR standalone archive
        if: ${{ github.event_name == 'workflow_run' }}
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          ./.github/scripts/download-pr-check-artifact.sh

      - name: Install adb and start Dockerify Android
        run: |
          sudo apt-get update
          sudo apt-get install -y adb
          echo "Using Dockerify Android image: $DOCKERIFY_ANDROID_IMAGE"
          
          if [ -e /dev/kvm ]; then
            echo "KVM is available. Starting with hardware acceleration."
          else
            echo "KVM is not available. Starting without hardware acceleration."
          fi
          docker run -d \
            --name dockerify-android \
            --privileged \
            -p 5555:5555 \
            -p 8000:8000 \
            "$DOCKERIFY_ANDROID_IMAGE"
          docker image inspect "$DOCKERIFY_ANDROID_IMAGE" \
            --format 'Dockerify image={{.RepoTags}} id={{.Id}} created={{.Created}}' || true
          
          echo "Giving emulator time to initialize..."
          sleep 20

      - name: Wait for emulator to boot
        run: |
          set -euo pipefail

          serial=localhost:5555
          check_dockerify_container() {
            local running status

            if ! docker container inspect dockerify-android >/dev/null 2>&1; then
              echo "dockerify-android container is not present." >&2
              docker ps -a --filter name=dockerify-android >&2 || true
              return 1
            fi

            running="$(docker inspect -f '{{.State.Running}}' dockerify-android 2>/dev/null || echo false)"
            status="$(docker inspect -f '{{.State.Status}} (exit={{.State.ExitCode}})' dockerify-android 2>/dev/null || true)"
            if [ "$running" != "true" ]; then
              echo "dockerify-android container is not running: ${status:-unknown}" >&2
              docker logs --tail 200 dockerify-android >&2 || true
              return 1
            fi

            if docker logs --tail 200 dockerify-android 2>&1 | grep -Eq 'entered FATAL state|Unknown AVD name|ANDROID_AVD_HOME is defined but there is no file android\.ini'; then
              echo "Dockerify Android emulator failed before ADB became usable." >&2
              docker logs --tail 200 dockerify-android >&2 || true
              return 1
            fi

            return 0
          }

          echo "Waiting for ADB TCP endpoint..."
          port_reachable=false
          for _ in {1..180}; do
            check_dockerify_container
            if bash -c "echo > /dev/tcp/127.0.0.1/5555" 2>/dev/null; then
              echo "ADB port is reachable."
              port_reachable=true
              break
            fi
            sleep 2
          done
          if [ "$port_reachable" != "true" ]; then
            echo "ADB TCP endpoint never became reachable." >&2
            docker logs --tail 200 dockerify-android >&2 || true
            exit 1
          fi

          echo "Connecting to emulator via ADB..."
          connected=false
          for _ in {1..180}; do
            check_dockerify_container
            output="$(timeout 10s adb connect "$serial" 2>&1 || true)"
            echo "$output"
            if echo "$output" | grep -Eq "connected to|already connected to"; then
              connected=true
              break
            fi
            sleep 2
          done
          if [ "$connected" != "true" ]; then
            echo "Failed to connect to ADB daemon." >&2
            adb devices -l || true
            exit 1
          fi

          echo "Waiting for device transport..."
          online=false
          for _ in {1..180}; do
            check_dockerify_container
            status="$(timeout 10s adb -s "$serial" get-state 2>/dev/null | tr -d '\r' || true)"
            echo "Current ADB state: ${status:-<empty>}"
            if [ "$status" = "device" ]; then
              online=true
              break
            fi
            sleep 2
          done
          if [ "$online" != "true" ]; then
            echo "Device never came online." >&2
            adb devices -l || true
            exit 1
          fi

          echo "Waiting for Android boot completion..."
          booted=false
          for _ in {1..240}; do
            check_dockerify_container
            boot_completed="$(timeout 10s adb -s "$serial" shell getprop sys.boot_completed 2>/dev/null | tr -d '\r' || true)"
            dev_bootcomplete="$(timeout 10s adb -s "$serial" shell getprop dev.bootcomplete 2>/dev/null | tr -d '\r' || true)"
            echo "sys.boot_completed=${boot_completed:-<empty>} dev.bootcomplete=${dev_bootcomplete:-<empty>}"
            if [ "$boot_completed" = "1" ] || [ "$dev_bootcomplete" = "1" ]; then
              booted=true
              break
            fi
            sleep 2
          done
          if [ "$booted" != "true" ]; then
            echo "System boot timed out." >&2
            adb -s "$serial" shell getprop || true
            exit 1
          fi

          adb devices -l

      - name: Probe Termux in Dockerify Android
        env:
          TERMUX_BOOTSTRAP_ATTEMPTS: 240
          TERMUX_INSTALL_ABI: ${{ env.TERMUX_INSTALL_ABI }}
          TERMUX_RESTORE_SNAPSHOT: false
          TERMUX_RESTORED_AVD_CACHE: false
          TERMUX_SAVE_SNAPSHOT: false
          TERMUX_EXTRA_COMMANDS: ${{ inputs.extra_commands || '' }}
          TERMUX_EXTRA_COMMANDS_AT_START: ${{ inputs.extra_commands_at_start || false }}
          TERMUX_RELEASE_TEST_TAG: ${{ env.TERMUX_RELEASE_TEST_TAG }}
        run: |
          bash .github/scripts/termux-emulator-probe.sh

      - name: Capture emulator diagnostic files
        if: always()
        run: |
          echo "=== Docker Container Logs ==="
          docker logs dockerify-android || true
          docker logs dockerify-android > termux-dockerify-container-logs.txt 2>/dev/null || true
          if adb devices | grep -q -E "\bdevice\b"; then
            adb logcat -d > termux-emulator-logcat.txt 2>/dev/null || true
            adb shell ps -A > termux-ps.txt 2>/dev/null || true
            adb shell dumpsys activity > termux-dumpsys-activity.txt 2>/dev/null || true
            adb shell dumpsys package com.termux > termux-dumpsys-package.txt 2>/dev/null || true
            adb shell run-as com.termux ls -la /data/data/com.termux/files/home > termux-home-listing.txt 2>/dev/null || true
            for dir in $(adb shell run-as com.termux find /data/data/com.termux/files/home/ -maxdepth 1 -name ".termux-probe-results-*" 2>/dev/null | tr -d '\r'); do
              if [ -n "$dir" ]; then
                base=$(basename "$dir")
                echo "=== Captured stdout for $base ===" > "termux-stdout-$base.txt"
                adb shell run-as com.termux cat "$dir/stdout" >> "termux-stdout-$base.txt" 2>/dev/null || true
                echo "=== Captured stderr for $base ===" > "termux-stderr-$base.txt"
                adb shell run-as com.termux cat "$dir/stderr" >> "termux-stderr-$base.txt" 2>/dev/null || true
                echo "=== Captured status for $base ===" > "termux-status-$base.txt"
                adb shell run-as com.termux cat "$dir/status" >> "termux-status-$base.txt" 2>/dev/null || true
              fi
            done
          else
            echo "No online adb devices found. Skipping adb diagnostics."
          fi

      - name: Upload emulator diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: termux-dockerify-diagnostics
          path: |
            termux-emulator-logcat.txt
            termux-ps.txt
            termux-dumpsys-activity.txt
            termux-dumpsys-package.txt
            termux-home-listing.txt
            termux-emulator-probe.env
            termux-releases.json
            termux-stdout-*.txt
            termux-stderr-*.txt
            termux-status-*.txt
            termux-dockerify-container-logs.txt
            termux-pr-artifact/antigravity-termux-standalone.tar.gz
          if-no-files-found: ignore
