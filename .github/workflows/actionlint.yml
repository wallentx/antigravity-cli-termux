name: Actionlint

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: actionlint-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Classify Changed Paths
        id: path_policy
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: ./.github/scripts/changed-paths.sh

      - name: Skip actionlint
        if: ${{ steps.path_policy.outputs.actionlint != 'true' }}
        run: echo "No workflow files changed; skipping actionlint."

      - name: Run actionlint
        if: ${{ steps.path_policy.outputs.actionlint == 'true' }}
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color
